version: "3.8"

services:

  app:
    build: ./app
    container_name: node-app
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
